name: Deploy to GitHub Pages

# Publishes the static app (repo root) to GitHub Pages on every push to main.
# One-time setup: Repo → Settings → Pages → "Build and deployment" → Source:
# "GitHub Actions". The site then lives at https://<owner>.github.io/<repo>/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run logic tests (gate)
        run: npm test

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Try to enable Pages automatically on first run (falls back to the
          # manual Settings → Pages → "GitHub Actions" source if not permitted).
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
